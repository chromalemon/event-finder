<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>{% block title %}Event Finder{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon" />
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="site-shell header-shell">
            <a class="brand" href="{% url 'dashboard' %}">
                <span class="brand-mark">EF</span>
                <span class="brand-text">Event Finder</span>
            </a>
            <nav class="site-nav" aria-label="Primary">
                <a href="{% url 'dashboard' %}">Home</a>
                <a href="{% url 'profile' %}">Your Profile</a>
                <a href="{% url 'profile_search' %}">Search Profiles</a>
                <a href="{% url 'events:create_event' %}">Create Event</a>
                <a href="{% url 'events:view_events' %}">Discover Events</a>
                <a href="{% url 'chat:index' %}">Chats</a>
                <a href="{% url 'logout' %}">Logout</a>
            </nav>
        </div>
    </header>

    <main class="site-shell site-main">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="site-shell">
        <p>&copy; 2026 Event Finder</p>
        </div>
    </footer>
</body>
</html>
