{% extends 'event_finder/base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<section class="auth-panel page-panel">
    <h1>Register</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit">Register</button>
        </div>
    </form>
</section>
{% endblock %}
